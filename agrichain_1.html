<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Ledger — Carbon Credit Platform</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <!-- React dev build required when using Babel standalone -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #EAE6DB;
      /* Muted oat background */
      --bg2: #F3F0E8;
      --bg3: #FFFFFF;
      --green: #4C8259;
      /* Forest green */
      --green2: #65A175;
      --green3: #A0C2A8;
      --gold: #CC913A;
      /* Harvest gold */
      --blue: #558797;
      --red: #BD5B4A;
      --teal: #64968C;
      --text: #213326;
      /* Dark slate green for text */
      --muted: #6B8071;
      --border: rgba(76, 130, 89, 0.2);
      --glow: 0 4px 20px rgba(76, 130, 89, 0.1);
      --font: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html,
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--green3);
      border-radius: 2px
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-7px)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes scanline {
      0% {
        top: -4px
      }

      100% {
        top: 100vh
      }
    }

    .fu {
      animation: fadeUp .4s ease both
    }

    .fu1 {
      animation: fadeUp .4s .05s ease both
    }

    .fu2 {
      animation: fadeUp .4s .1s ease both
    }

    .fu3 {
      animation: fadeUp .4s .15s ease both
    }

    body {
      background-image: repeating-linear-gradient(0deg, transparent, transparent 54px, rgba(76, 130, 89, .013) 54px, rgba(76, 130, 89, .013) 55px), repeating-linear-gradient(90deg, transparent, transparent 54px, rgba(76, 130, 89, .013) 54px, rgba(76, 130, 89, .013) 55px)
    }

    .shell {
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      width: 228px;
      background: rgba(255, 255, 255, .97);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 30
    }

    .sb-logo {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 4px
    }

    .sb-logo-icon {
      font-size: 26px;
      flex-shrink: 0;
      animation: float 3.5s ease-in-out infinite
    }

    .sb-logo-name {
      font-size: 19px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -1px;
      line-height: 1.1
    }

    .sb-logo-sub {
      font-size: 8.5px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 2px
    }

    .nav-item {
      padding: 11px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--muted);
      transition: all .18s;
      border-left: 3px solid transparent;
      user-select: none
    }

    .nav-item:hover {
      color: var(--text);
      background: rgba(76, 130, 89, .04)
    }

    .nav-item.active {
      color: var(--green);
      border-left-color: var(--green);
      background: rgba(76, 130, 89, .07)
    }

    .nav-icon {
      font-size: 15px;
      width: 19px;
      text-align: center;
      flex-shrink: 0
    }

    .sb-section {
      padding: 14px 20px 5px;
      font-size: 8.5px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px
    }

    .sb-div {
      height: 1px;
      background: var(--border);
      margin: 5px 0
    }

    .sb-kv {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 20px;
      font-size: 11px
    }

    .sb-k {
      color: var(--muted);
      font-weight: 600
    }

    .sb-v {
      color: var(--green);
      font-family: var(--mono);
      font-size: 9.5px;
      font-weight: 700
    }

    .sb-spacer {
      flex: 1
    }

    .logout-btn {
      margin: 8px 16px 0;
      padding: 10px 15px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      font-weight: 700;
      font-size: 12px;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .logout-btn:hover {
      border-color: rgba(255, 77, 77, .4);
      color: var(--red);
      background: rgba(255, 77, 77, .05)
    }

    .main {
      margin-left: 228px;
      padding: 28px 32px;
      min-height: 100vh
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 26px;
      flex-wrap: wrap;
      gap: 10px
    }

    .pg-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1
    }

    .pg-title span {
      color: var(--green)
    }

    .pg-sub {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 4px;
      font-family: var(--mono)
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap
    }

    .live-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(76, 130, 89, .07);
      border: 1px solid rgba(76, 130, 89, .2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 9.5px;
      font-weight: 800;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 1.2px
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
      box-shadow: 0 0 5px var(--green)
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 700
    }

    .u-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite
    }

    .card {
      background: rgba(255, 255, 255, .85);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 20px
    }

    .card-title {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px
    }

    .sg3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 13px;
      margin-bottom: 15px
    }

    .sg4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 13px;
      margin-bottom: 15px
    }

    .stat-card {
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 20px 18px 16px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow);
      border-color: rgba(76, 130, 89, .25)
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(76, 130, 89, .15), transparent)
    }

    .stat-label {
      font-size: 9px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px
    }

    .stat-val {
      font-size: 31px;
      font-weight: 800;
      color: var(--green);
      font-family: var(--mono);
      line-height: 1
    }

    .stat-sub {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 7px
    }

    .g2 {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 13px;
      margin-bottom: 15px
    }

    .g2b {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 15px
    }

    .g3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 13px;
      margin-bottom: 15px
    }

    .tabs {
      display: flex;
      gap: 7px;
      margin-bottom: 18px;
      flex-wrap: wrap
    }

    .tab {
      padding: 8px 15px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 700;
      font-family: var(--font);
      transition: all .18s;
      background: transparent;
      color: var(--muted)
    }

    .tab:hover {
      color: var(--text);
      border-color: rgba(76, 130, 89, .22)
    }

    .tab.on {
      border-color: var(--green);
      background: rgba(76, 130, 89, .08);
      color: var(--green)
    }

    .btn {
      padding: 11px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--green2), #83BF91);
      color: #000;
      font-weight: 800;
      font-size: 13px;
      font-family: var(--font);
      transition: all .18s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px
    }

    .btn:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(76, 130, 89, .38)
    }

    .btn:active:not(:disabled) {
      transform: scale(.98)
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    .btn.full {
      width: 100%
    }

    .btn-ghost {
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font);
      font-weight: 700;
      font-size: 13px;
      transition: all .18s
    }

    .btn-ghost:hover {
      border-color: rgba(255, 77, 77, .4);
      color: var(--red)
    }

    .health-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 8px
    }

    .ring-wrap {
      position: relative;
      width: 144px;
      height: 144px;
      margin: 8px auto;
      animation: float 4s ease-in-out infinite
    }

    .ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none
    }

    .ring-num {
      font-size: 30px;
      font-weight: 800;
      font-family: var(--mono);
      line-height: 1
    }

    .ring-lbl {
      font-size: 8.5px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 3px
    }

    .chart-wrap {
      width: 100%;
      overflow: visible;
      display: block
    }

    .chart-tip {
      position: fixed;
      z-index: 100;
      background: rgba(255, 255, 255, .97);
      border: 1px solid rgba(76, 130, 89, .28);
      border-radius: 9px;
      padding: 8px 13px;
      pointer-events: none;
      font-size: 12px;
      font-family: var(--mono);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .6)
    }

    .alert-bar {
      background: rgba(245, 197, 24, .07);
      border: 1px solid rgba(245, 197, 24, .28);
      border-radius: 11px;
      padding: 11px 15px;
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 15px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--gold)
    }

    .wx-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      text-align: center
    }

    .farms-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 13px
    }

    .farm-card {
      background: rgba(255, 255, 255, .88);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 18px;
      transition: transform .22s, box-shadow .22s, border-color .22s;
      position: relative
    }

    .farm-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(76, 130, 89, .12);
      border-color: rgba(76, 130, 89, .26)
    }

    .badge {
      font-size: 9px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
      display: inline-block
    }

    .b-bee {
      background: rgba(56, 189, 248, .1);
      color: var(--blue);
      border: 1px solid rgba(56, 189, 248, .22)
    }

    .b-verra {
      background: rgba(245, 197, 24, .1);
      color: var(--gold);
      border: 1px solid rgba(245, 197, 24, .22)
    }

    .b-hi {
      background: rgba(76, 130, 89, .1);
      color: var(--green);
      border: 1px solid rgba(76, 130, 89, .22)
    }

    .b-md {
      background: rgba(245, 197, 24, .08);
      color: var(--gold);
      border: 1px solid rgba(245, 197, 24, .18)
    }

    .b-lo {
      background: rgba(255, 77, 77, .08);
      color: var(--red);
      border: 1px solid rgba(255, 77, 77, .18)
    }

    .farm-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin: 11px 0
    }

    .fsb {
      background: var(--bg3);
      border-radius: 8px;
      padding: 9px;
      text-align: center;
      border: 1px solid var(--border)
    }

    .fsb-val {
      font-size: 15px;
      font-weight: 800;
      font-family: var(--mono)
    }

    .fsb-lbl {
      font-size: 8.5px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 2px
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    th {
      padding: 8px 11px;
      text-align: left;
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .9px;
      border-bottom: 1px solid var(--border)
    }

    td {
      padding: 10px 11px;
      border-bottom: 1px solid rgba(76, 130, 89, .04);
      vertical-align: middle
    }

    tr:hover td {
      background: rgba(76, 130, 89, .018)
    }

    .chip {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 9.5px;
      font-weight: 800
    }

    .chip-g {
      background: rgba(76, 130, 89, .1);
      color: var(--green);
      border: 1px solid rgba(76, 130, 89, .2)
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid rgba(76, 130, 89, .05)
    }

    .info-row:last-child {
      border-bottom: none
    }

    .ik {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 600
    }

    .iv {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
      font-weight: 700
    }

    .pf-big {
      background: rgba(255, 255, 255, .8);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 22px;
      text-align: center
    }

    .pf-val {
      font-size: 28px;
      font-weight: 800;
      font-family: var(--mono);
      color: var(--green)
    }

    .pf-lbl {
      font-size: 9px;
      color: var(--muted);
      margin-top: 5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px
    }

    .tx-link {
      color: var(--blue);
      font-family: var(--mono);
      font-size: 10.5px;
      text-decoration: none
    }

    .tx-link:hover {
      text-decoration: underline;
      color: var(--teal)
    }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 13px
    }

    .empty .ei {
      font-size: 38px;
      margin-bottom: 12px
    }

    .login-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 10% 60%, rgba(7, 61, 28, .5) 0%, transparent 50%), radial-gradient(ellipse at 90% 10%, rgba(76, 130, 89, .06) 0%, transparent 45%), var(--bg)
    }

    .login-card {
      background: rgba(255, 255, 255, .97);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 42px 40px;
      width: 480px;
      position: relative;
      animation: fadeUp .5s ease;
      box-shadow: 0 40px 90px rgba(0, 0, 0, .7)
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 25%;
      right: 25%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent)
    }

    .login-head {
      text-align: center;
      margin-bottom: 30px
    }

    .login-icon {
      font-size: 50px;
      display: block;
      margin-bottom: 10px;
      animation: float 4s ease-in-out infinite
    }

    .login-title {
      font-size: 30px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -1.2px
    }

    .login-sub {
      font-size: 9.5px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 5px
    }

    .mode-tabs {
      display: flex;
      background: rgba(243, 240, 232, .8);
      border-radius: 11px;
      padding: 4px;
      margin-bottom: 22px;
      border: 1px solid var(--border)
    }

    .mode-tab {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 12.5px;
      font-weight: 700;
      transition: all .18s;
      background: transparent;
      color: var(--muted)
    }

    .mode-tab.on {
      background: rgba(76, 130, 89, .1);
      color: var(--green);
      border: 1px solid rgba(76, 130, 89, .2)
    }

    .fg {
      margin-bottom: 13px
    }

    .fl {
      font-size: 9.5px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      display: block
    }

    .fi,
    .fs {
      width: 100%;
      padding: 11px 13px;
      background: rgba(243, 240, 232, .8);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 13.5px;
      font-family: var(--font);
      outline: none;
      transition: all .18s
    }

    .fi:focus,
    .fs:focus {
      border-color: var(--green2);
      box-shadow: 0 0 0 3px rgba(76, 130, 89, .07)
    }

    .fi::placeholder {
      color: var(--muted)
    }

    .fs option {
      background: #091508
    }

    .f2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px
    }

    .err-box {
      font-size: 11.5px;
      color: var(--red);
      padding: 9px 13px;
      background: rgba(255, 77, 77, .06);
      border-radius: 9px;
      border: 1px solid rgba(255, 77, 77, .18);
      margin-bottom: 13px;
      font-weight: 700
    }

    .ok-box {
      font-size: 11.5px;
      color: var(--green);
      padding: 9px 13px;
      background: rgba(76, 130, 89, .05);
      border-radius: 9px;

    }

    .spin {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(0, 0, 0, .2);
      border-top-color: #000;

      animation: spin .6s linear infinite;

    }

    .fpill {
      color: var(--muted);
      padding: 5px 9px;
      background: rgba(243, 240, 232, .9);
      border-radius: 7px;
      font-family: var(--mono);
      font-size: 11.5px;
      border: 1px solid var(--border)
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    /* ── IN-MEMORY DB ── */
    const MEM = {};
    const DB = {
      get: function (k, d) { return MEM[k] !== undefined ? MEM[k] : (d !== undefined ? d : null); },
      set: function (k, v) { MEM[k] = v; }
    };

    /* ── CARBON ENGINE ── */
    const BIO = { Rice: 0.45, Wheat: 0.38, Coffee: 2.10, Grapes: 1.80, Spices: 0.60, Cotton: 0.55, Sugarcane: 3.20, Other: 0.50 };
    function calcC(plants, hum, crop, acres) {
      const ha = acres * 0.4047;
      const hf = hum >= 55 && hum <= 70 ? 1.0 : hum < 55 ? 0.85 + (hum / 55) * 0.15 : Math.max(0.7, 1 - (hum - 70) * 0.01);
      const agb = +((plants * (BIO[crop] || 0.5) * hf) / 1000 / ha).toFixed(3);
      const bgb = +(agb * 0.2).toFixed(3);
      const cc = +((agb + bgb) * 0.5).toFixed(3);
      const co2e = +(cc * 3.67).toFixed(3);
      const cred = +(co2e * ha).toFixed(2);
      const DENS = { Rice: 300, Wheat: 350, Coffee: 40, Grapes: 60, Spices: 80 };
      const hs = Math.round(Math.min(100, (plants / ((DENS[crop] || 200) * ha)) * 100) * 0.7 + hf * 100 * 0.3);
      return { agb, bgb, cc, co2e, credits: cred, health: hs };
    }

    /* ── SEED DATA ── */
    (function seed() {
      if (DB.get('seeded')) return;
      const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const FD = [
        { id: 'f1', name: 'Ravi Kumar', email: 'ravi@demo.io', pw: 'password123', farmName: 'Sundarbans Delta', loc: 'West Bengal', area: 12, crop: 'Rice', bee: true, verra: true },
        { id: 'f2', name: 'Priya Sharma', email: 'priya@demo.io', pw: 'password123', farmName: 'Coorg Highlands', loc: 'Karnataka', area: 8, crop: 'Coffee', bee: true, verra: false },
        { id: 'f3', name: 'Arjun Patel', email: 'arjun@demo.io', pw: 'password123', farmName: 'Punjab Wheat Plains', loc: 'Punjab', area: 20, crop: 'Wheat', bee: true, verra: true },
        { id: 'f4', name: 'Meena Nair', email: 'meena@demo.io', pw: 'password123', farmName: 'Kerala Spice Garden', loc: 'Kerala', area: 6, crop: 'Spices', bee: false, verra: true },
        { id: 'f5', name: 'Suresh Reddy', email: 'suresh@demo.io', pw: 'password123', farmName: 'Nashik Valley', loc: 'Maharashtra', area: 10, crop: 'Grapes', bee: false, verra: true },
      ];
      const farmers = FD.map(function (f, i) {
        let total = 0;
        let cons = 0;
        let recs = [];

        if (f.id !== 'f1') {
          recs = DAYS.map(function (day, di) {
            const p = 1700 + i * 120 + di * 55 + Math.round((Math.random() - .5) * 80);
            const h = +(55 + i * 2 + di * (Math.random() > .5 ? 1 : -1) * 3).toFixed(1);
            const t = +(27 + i * 0.4 + di * 0.2).toFixed(1);
            const s = +(700 + i * 30 + di * 20).toFixed(0);
            const c = calcC(p, h, f.crop, f.area);
            total += c.credits;
            return { day, p, h, t, s, agb: c.agb, bgb: c.bgb, cc: c.cc, co2e: c.co2e, credits: c.credits, health: c.health, ts: Date.now() - ((6 - di) * 864e5) };
          });
          const ps = recs.map(function (r) { return r.p; }), avg = ps.reduce(function (a, b) { return a + b; }, 0) / ps.length;
          const std = Math.sqrt(ps.reduce(function (s, c) { return s + Math.pow(c - avg, 2); }, 0) / ps.length);
          cons = Math.max(0, Math.min(100, Math.round((1 - std / avg) * 100)));
        }

        DB.set('rec_' + f.id, recs);
        return Object.assign({}, f, { total: +total.toFixed(2), cons: cons, fid: 'FRM-00' + (i + 1) });
      });
      DB.set('farmers', farmers);
      DB.set('traders', [
        { id: 't1', name: 'Amit Shah', email: 'amit@demo.io', pw: 'password123', wallet: '0x3f4A2B9c1d8E5F7a6B0C3D2E', credits: 0, spent: 0, txs: [] },
        { id: 't2', name: 'Deepa Menon', email: 'deepa@demo.io', pw: 'password123', wallet: '0xA1B2C3D4E5F6a7b8c9d0e1f2', credits: 0, spent: 0, txs: [] },
      ]);
      DB.set('seeded', true);
    })();

    /* ── AUTH HELPERS ── */
    function findUser(email, pw, role) {
      const list = DB.get(role === 'farmer' ? 'farmers' : 'traders', []);
      return list.find(function (u) { return u.email === email && u.pw === pw; }) || null;
    }
    function registerUser(role, data) {
      const key = role === 'farmer' ? 'farmers' : 'traders';
      const list = DB.get(key, []);
      if (list.find(function (u) { return u.email === data.email; })) throw new Error('Email already registered.');
      const u = Object.assign({}, data, { id: role[0] + Date.now(), total: 0, cons: 0, credits: 0, spent: 0, txs: [] });
      if (role === 'farmer') { u.fid = 'FRM-' + String(list.length + 1).padStart(3, '0'); u.bee = false; u.verra = false; DB.set('rec_' + u.id, []); }
      DB.set(key, [...list, u]);
      return u;
    }
    function getRecs(fid) { return DB.get('rec_' + fid, []); }
    function addRec(fid, rec) {
      const recs = getRecs(fid).slice(-6);
      recs.push(rec);
      DB.set('rec_' + fid, recs);
      const farmers = DB.get('farmers', []);
      const i = farmers.findIndex(function (f) { return f.id === fid; });
      if (i >= 0) {
        farmers[i].total = +(farmers[i].total + rec.credits).toFixed(2);
        const ps = recs.map(function (r) { return r.p; });
        if (ps.length > 1) {
          const avg = ps.reduce(function (a, b) { return a + b; }, 0) / ps.length;
          const std = Math.sqrt(ps.reduce(function (s, c) { return s + Math.pow(c - avg, 2); }, 0) / ps.length);
          farmers[i].cons = Math.max(0, Math.min(100, Math.round((1 - std / avg) * 100)));
        }
        DB.set('farmers', farmers);
      }
    }

    /* ── PURE SVG CHARTS (no external deps) ── */
    function SvgArea({ data, xKey, yKey, color, h }) {
      h = h || 180;
      const [tip, setTip] = useState(null);
      const [hi, setHi] = useState(-1);
      if (!data || data.length < 2) return React.createElement('div', { style: { height: h, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--muted)', fontSize: 12 } }, 'No data yet');
      const W = 540, H = h, pl = 42, pr = 10, pt = 10, pb = 26, cW = W - pl - pr, cH = H - pt - pb;
      const vals = data.map(function (d) { return d[yKey]; });
      const mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals), rng = mx - mn || 1;
      const px = function (i) { return pl + i * (cW / (data.length - 1)); };
      const py = function (v) { return pt + cH - (((v - mn) / rng) * cH); };
      const pts = data.map(function (d, i) { return px(i) + ',' + py(d[yKey]); }).join(' ');
      const areaPath = 'M' + px(0) + ',' + py(data[0][yKey]) + data.map(function (d, i) { return ' L' + px(i) + ',' + py(d[yKey]); }).join('') + ' L' + px(data.length - 1) + ',' + (pt + cH) + ' L' + pl + ',' + (pt + cH) + ' Z';
      const gid = 'g' + yKey.replace(/[^a-z]/gi, '') + (Math.random() * 1e6 | 0);
      const gridFs = [0, 0.25, 0.5, 0.75, 1];
      return (
        <div style={{ position: 'relative', userSelect: 'none' }}>
          <svg viewBox={'0 0 ' + W + ' ' + H} className="chart-wrap" style={{ height: h }} onMouseLeave={function () { setTip(null); setHi(-1); }}>
            <defs>
              <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={color} stopOpacity="0.22" />
                <stop offset="100%" stopColor={color} stopOpacity="0" />
              </linearGradient>
            </defs>
            {gridFs.map(function (f, i) {
              const y = pt + cH * f, v = (mx - rng * f).toFixed(1);
              return <g key={i}><line x1={pl} y1={y} x2={pl + cW} y2={y} stroke="rgba(76, 130, 89,.05)" strokeWidth="1" /><text x={pl - 5} y={y + 4} textAnchor="end" fill="#6b8071" fontSize="9" fontFamily="JetBrains Mono,monospace">{v}</text></g>;
            })}
            {data.map(function (d, i) { return <text key={i} x={px(i)} y={H - 5} textAnchor="middle" fill="#6b8071" fontSize="9" fontFamily="JetBrains Mono,monospace">{d[xKey]}</text>; })}
            <path d={areaPath} fill={'url(#' + gid + ')'} />
            <polyline points={pts} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" />
            {hi >= 0 && <line x1={px(hi)} y1={pt} x2={px(hi)} y2={pt + cH} stroke={color} strokeOpacity="0.2" strokeWidth="1" strokeDasharray="4 3" />}
            {data.map(function (d, i) {
              return <g key={i}>
                <rect x={px(i) - 14} y={pt} width="28" height={cH} fill="transparent" style={{ cursor: 'crosshair' }}
                  onMouseEnter={function (e) { setHi(i); setTip({ x: e.clientX, y: e.clientY, v: d[yKey], l: d[xKey] }); }}
                  onMouseMove={function (e) { setTip(function (t) { return t ? { x: e.clientX, y: e.clientY, v: t.v, l: t.l } : null; }); }} />
                <circle cx={px(i)} cy={py(d[yKey])} r={hi === i ? 4.5 : 2.8} fill={color} style={{ filter: 'drop-shadow(0 0 4px ' + color + ')', transition: 'r .15s', pointerEvents: 'none' }} />
              </g>;
            })}
          </svg>
          {tip && <div className="chart-tip" style={{ left: tip.x + 14, top: tip.y - 40 }}><span style={{ color: '#6b8071', fontSize: 10 }}>{tip.l} </span><span style={{ color: color }}>{Number(tip.v).toFixed(2)}</span></div>}
        </div>
      );
    }

    function SvgBar({ data, xKey, yKey, color, h }) {
      h = h || 150;
      const [tip, setTip] = useState(null);
      const [hi, setHi] = useState(-1);
      if (!data || !data.length) return null;
      const W = 540, H = h, pl = 44, pr = 10, pt = 8, pb = 26, cW = W - pl - pr, cH = H - pt - pb;
      const vals = data.map(function (d) { return d[yKey]; });
      const mx = Math.max.apply(null, vals) || 1;
      const bw = Math.max(10, (cW / data.length) * 0.55), gap = cW / data.length;
      return (
        <div style={{ position: 'relative', userSelect: 'none' }}>
          <svg viewBox={'0 0 ' + W + ' ' + H} className="chart-wrap" style={{ height: h }} onMouseLeave={function () { setTip(null); setHi(-1); }}>
            {[0, .25, .5, .75, 1].map(function (f, i) {
              const y = pt + cH * f;
              return <g key={i}><line x1={pl} y1={y} x2={pl + cW} y2={y} stroke="rgba(76, 130, 89,.05)" strokeWidth="1" /><text x={pl - 5} y={y + 4} textAnchor="end" fill="#6b8071" fontSize="9" fontFamily="JetBrains Mono,monospace">{Math.round(mx * (1 - f))}</text></g>;
            })}
            {data.map(function (d, i) {
              const x = pl + gap * i + gap / 2 - bw / 2, bh = Math.max(2, (d[yKey] / mx) * cH), y = pt + cH - bh;
              return <g key={i}>
                <rect x={x} y={y} width={bw} height={bh} rx="3" fill={hi === i ? '#83BF91' : color}
                  style={{ filter: hi === i ? 'drop-shadow(0 0 6px ' + color + ')' : 'none', transition: 'fill .15s', cursor: 'crosshair' }}
                  onMouseEnter={function (e) { setHi(i); setTip({ x: e.clientX, y: e.clientY, v: d[yKey], l: d[xKey] }); }}
                  onMouseMove={function (e) { setTip(function (t) { return t ? { x: e.clientX, y: e.clientY, v: t.v, l: t.l } : null; }); }} />
                <text x={x + bw / 2} y={H - 6} textAnchor="middle" fill="#6b8071" fontSize="9" fontFamily="JetBrains Mono,monospace">{d[xKey]}</text>
              </g>;
            })}
          </svg>
          {tip && <div className="chart-tip" style={{ left: tip.x + 14, top: tip.y - 40 }}><span style={{ color: '#6b8071', fontSize: 10 }}>{tip.l} </span><span style={{ color: color }}>{Number(tip.v).toLocaleString()}</span></div>}
        </div>
      );
    }

    function SvgLine({ data, xKey, yKey, color, h, unit }) {
      h = h || 150; unit = unit || '';
      const [tip, setTip] = useState(null);
      const [hi, setHi] = useState(-1);
      if (!data || data.length < 2) return null;
      const W = 540, H = h, pl = 42, pr = 10, pt = 8, pb = 26, cW = W - pl - pr, cH = H - pt - pb;
      const vals = data.map(function (d) { return d[yKey]; });
      const mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals), rng = mx - mn || 1;
      const px = function (i) { return pl + i * (cW / (data.length - 1)); };
      const py = function (v) { return pt + cH - (((v - mn) / rng) * cH); };
      const pts = data.map(function (d, i) { return px(i) + ',' + py(d[yKey]); }).join(' ');
      return (
        <div style={{ position: 'relative', userSelect: 'none' }}>
          <svg viewBox={'0 0 ' + W + ' ' + H} className="chart-wrap" style={{ height: h }} onMouseLeave={function () { setTip(null); setHi(-1); }}>
            {[mn, mn + rng * .25, mn + rng * .5, mn + rng * .75, mx].map(function (v, i) {
              const y = pt + cH - ((v - mn) / rng) * cH;
              return <g key={i}><line x1={pl} y1={y} x2={pl + cW} y2={y} stroke="rgba(76, 130, 89,.05)" strokeWidth="1" /><text x={pl - 5} y={y + 4} textAnchor="end" fill="#6b8071" fontSize="9" fontFamily="JetBrains Mono,monospace">{v.toFixed(1)}</text></g>;
            })}
            {data.map(function (d, i) { return <text key={i} x={px(i)} y={H - 5} textAnchor="middle" fill="#6b8071" fontSize="9" fontFamily="JetBrains Mono,monospace">{d[xKey]}</text>; })}
            <polyline points={pts} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" />
            {hi >= 0 && <line x1={px(hi)} y1={pt} x2={px(hi)} y2={pt + cH} stroke={color} strokeOpacity="0.2" strokeWidth="1" strokeDasharray="4 3" />}
            {data.map(function (d, i) {
              return <g key={i}>
                <rect x={px(i) - 14} y={pt} width="28" height={cH} fill="transparent" style={{ cursor: 'crosshair' }}
                  onMouseEnter={function (e) { setHi(i); setTip({ x: e.clientX, y: e.clientY, v: d[yKey], l: d[xKey] }); }}
                  onMouseMove={function (e) { setTip(function (t) { return t ? { x: e.clientX, y: e.clientY, v: t.v, l: t.l } : null; }); }} />
                <circle cx={px(i)} cy={py(d[yKey])} r={hi === i ? 4 : 2.5} fill={color} style={{ filter: 'drop-shadow(0 0 3px ' + color + ')', transition: 'r .15s', pointerEvents: 'none' }} />
              </g>;
            })}
          </svg>
          {tip && <div className="chart-tip" style={{ left: tip.x + 14, top: tip.y - 40 }}><span style={{ color: '#6b8071', fontSize: 10 }}>{tip.l} </span><span style={{ color: color }}>{tip.v}{unit}</span></div>}
        </div>
      );
    }

    /* ── HEALTH RING ── */
    function HealthRing({ value }) {
      const r = 56, cx = 72, cy = 72, sw = 9, circ = 2 * Math.PI * r, offset = circ - Math.min(1, value / 100) * circ;
      const col = value >= 80 ? '#4c8259' : value >= 60 ? '#cc913a' : '#bd5b4a';
      return (
        <div className="health-wrap">
          <div className="card-title" style={{ marginBottom: 4, textAlign: 'center' }}>Plant Health Score</div>
          <div className="ring-wrap">
            <svg width="144" height="144">
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(243, 240, 232,0.9)" strokeWidth={sw} />
              <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth={sw} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform={'rotate(-90 ' + cx + ' ' + cy + ')'} style={{ filter: 'drop-shadow(0 0 10px ' + col + ')', transition: 'stroke-dashoffset 1.1s ease,stroke .4s ease' }} />
            </svg>
            <div className="ring-center">
              <div className="ring-num" style={{ color: col }}>{value}%</div>
              <div className="ring-lbl">Healthy</div>
            </div>
          </div>
          <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--muted)', marginTop: 4, fontWeight: 600 }}>
            {value >= 80 ? '🟢 Excellent' : value >= 60 ? '🟡 Good' : '🔴 Needs attention'}
          </div>
        </div>
      );
    }

    function Toast({ toast, onClose }) {
      if (!toast) return null;
      return <div className={'toast' + (toast.type === 'error' ? ' toast-err' : '')}><span style={{ flex: 1 }}>{toast.msg}</span><button className="toast-x" onClick={onClose}>×</button></div>;
    }
    function Spin() { return <div className="spin" />; }

    /* ── FARMER DASHBOARD ── */
    function FarmerDash({ user, setUser, setToast, activeTab, setActiveTab }) {
      const [recs, setRecs] = useState(function () { return getRecs(user.id); });
      const [running, setRunning] = useState(false);
      const [simDay, setSimDay] = useState(0);
      const [apiDates, setApiDates] = useState(['2025-3-1', '2025-3-2', '2025-3-3', '2025-3-4', '2025-3-5', '2025-3-6', '2025-3-7']);

      React.useEffect(function () {
        const fetchDates = async function () {
          try {
            const isFile = window.location.protocol === 'file:';
            const apiHost = isFile ? '127.0.0.1' : window.location.hostname;
            const res = await fetch(`http://${apiHost}:8000/api/v1/available-dates`);
            if (res.ok) {
              const data = await res.json();
              if (data.dates && data.dates.length > 0) setApiDates(data.dates);
            }
          } catch (e) { }
        };
        fetchDates();
      }, []);

      const [apiWeather, setApiWeather] = useState(null);
      React.useEffect(function () {
        if (activeTab === 'weather' && !apiWeather) {
          const fetchWeather = async function () {
            try {
              const isFile = window.location.protocol === 'file:';
              const apiHost = isFile ? '127.0.0.1' : window.location.hostname;
              const res = await fetch(`http://${apiHost}:8000/api/v1/weather`);
              if (res.ok) {
                const data = await res.json();
                if (data.status === 'success') {
                  setApiWeather(data);
                }
              }
            } catch (e) { }
          };
          fetchWeather();
        }
      }, [activeTab, apiWeather]);

      const refresh = function () {
        setRecs(getRecs(user.id));
        const fu = DB.get('farmers', []).find(function (f) { return f.id === user.id; });
        if (fu) setUser(fu);
      };

      const simulate = async function () {
        if (running) return;
        setRunning(true);
        const dates = apiDates;
        const dateParam = dates[simDay % dates.length];
        const day = dateParam;

        const isFile = window.location.protocol === 'file:';
        const apiHost = isFile ? '127.0.0.1' : window.location.hostname;
        const apiBaseUrl = `http://${apiHost}:8000`;

        try {
          const res = await fetch(`${apiBaseUrl}/api/v1/analyze-farm?date=${dateParam}`);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          const data = await res.json();

          const metrics = data.farm_metrics || {};
          const carbon = data.carbon_data || {};

          const p = metrics.plant_count || 0;
          const h = metrics.humidity || 60;
          const t = metrics.temperature || 25;
          const s = +(700 + Math.random() * 200).toFixed(0);

          const c = calcC(p, h, user.crop, user.area);

          const co2e = carbon.total_co2_sequestered_kg ? +(carbon.total_co2_sequestered_kg / 1000).toFixed(3) : c.co2e;
          const credits = carbon.credits_generated ? +(carbon.credits_generated).toFixed(2) : c.credits;
          const health = metrics.health_index ? Math.round(metrics.health_index * 100) : c.health;

          addRec(user.id, { day, p, h, t, s, agb: c.agb, bgb: c.bgb, cc: c.cc, co2e, credits, health, ts: Date.now() });
          refresh();
          setSimDay(function (d) { return d + 1; });
          setToast({ msg: '✅ ' + day + ': API Data loaded! ' + p.toLocaleString() + ' plants → ' + credits + ' credits!', type: 'success' });
        } catch (err) {
          console.error(err);
          // Fallback to random if API fails
          const p = 1900 + simDay * 55 + Math.round((Math.random() - .5) * 100);
          const h = +(58 + Math.random() * 15).toFixed(1);
          const t = +(27 + Math.random() * 4).toFixed(1);
          const s = +(700 + Math.random() * 200).toFixed(0);
          const c = calcC(p, h, user.crop, user.area);
          addRec(user.id, { day, p, h, t, s, agb: c.agb, bgb: c.bgb, cc: c.cc, co2e: c.co2e, credits: c.credits, health: c.health, ts: Date.now() });
          refresh();
          setSimDay(function (d) { return d + 1; });
          setToast({ msg: '⚠️ ' + day + ': API Failed (' + err.message + '), used simulation → ' + c.credits + ' credits!', type: 'success' });
        } finally {
          setRunning(false);
        }
      };

      const fu = DB.get('farmers', []).find(function (f) { return f.id === user.id; }) || user;
      const latest = recs[recs.length - 1];
      const week = recs.slice(-7);

      return (
        <div>
          <div className="topbar">
            <div>
              <div className="pg-title">Farmer <span>Dashboard</span></div>
              <div className="pg-sub">{fu.fid} · {fu.crop} · {fu.area} acres · {fu.loc}</div>
            </div>
            <div className="tb-right">
              <div className="live-tag"><div className="live-dot" />Live Monitoring</div>
              <div className="user-pill"><div className="u-dot" />{fu.name}</div>
            </div>
          </div>
          <div className="tabs">
            {[['overview', '📊 Overview'], ['deepdive', '🔬 Deep Dive'], ['simulate', '🤖 Video Analysis']].map(function ([k, v]) {
              return <button key={k} className={'tab' + (activeTab === k ? ' on' : '')} onClick={function () { setActiveTab(k); }}>{v}</button>;
            })}
          </div>

          {activeTab === 'overview' && (
            <div className="fu">
              <div className="sg3">
                {[
                  { l: 'Carbon Credits', v: (fu.total || 0).toFixed(1), s: 'tCO₂ sequestered', c: 'var(--green)' },
                  { l: 'Active Plants', v: (latest && latest.p || 0).toLocaleString(), s: 'Latest scan', c: 'var(--green)' },
                  { l: 'Consistency', v: (fu.cons || 0) + '%', s: fu.cons >= 80 ? '▲ Excellent' : fu.cons >= 60 ? '● Good' : '▼ Needs work', c: fu.cons >= 80 ? 'var(--green)' : fu.cons >= 60 ? 'var(--gold)' : 'var(--red)' },
                ].map(function (item, i) {
                  return <div key={i} className={'stat-card fu' + (i + 1)}><div className="stat-label">{item.l}</div><div className="stat-val" style={{ color: item.c }}>{item.v}</div><div className="stat-sub">{item.s}</div></div>;
                })}
              </div>
              {week.length > 0 ? (
                <>
                  <div className="g2 fu2">
                    <div className="card">
                      <div className="card-title">Carbon Credits — Last {week.length} Days</div>
                      <SvgArea data={week.map(function (r) { return { day: r.day, credits: r.credits }; })} xKey="day" yKey="credits" color="#4c8259" h={185} />
                    </div>
                    <div className="card"><HealthRing value={latest && latest.health || 0} /></div>
                  </div>
                  <div className="g2b fu3">
                    <div className="card">
                      <div className="card-title">Plant Count Trend</div>
                      <SvgBar data={week.map(function (r) { return { day: r.day, plants: r.p }; })} xKey="day" yKey="plants" color="#65a175" h={148} />
                    </div>
                    <div className="card">
                      <div className="card-title">Humidity % Trend</div>
                      <SvgLine data={week.map(function (r) { return { day: r.day, hum: r.h }; })} xKey="day" yKey="hum" color="#558797" h={148} unit="%" />
                    </div>
                  </div>
                </>
              ) : (
                <div className="card fu2" style={{ textAlign: 'center', padding: '52px 20px' }}>
                  <div style={{ fontSize: 44, marginBottom: 14 }}>🌱</div>
                  <div style={{ color: 'var(--muted)', fontSize: 14, marginBottom: 20 }}>No data yet — go to <strong style={{ color: 'var(--green)' }}>Simulate</strong> to start!</div>
                  <button className="btn" onClick={function () { setActiveTab('simulate'); }}>Go to Simulate →</button>
                </div>
              )}
            </div>
          )}

          {activeTab === 'deepdive' && (
            <div className="fu">
              {latest ? (
                <>
                  <div className="card" style={{ marginBottom: 14 }}>
                    <div className="card-title">IPCC Carbon Breakdown — {latest.day}</div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 11 }}>
                      {[{ l: 'Above Ground Biomass', v: latest.agb + ' t/ha', icon: '🌿', n: 'via NDVI' }, { l: 'Below Ground Biomass', v: latest.bgb + ' t/ha', icon: '🌱', n: 'AGB × 0.20' }, { l: 'Carbon Content', v: latest.cc + ' tC', icon: '⚗️', n: 'Total × 0.50' }, { l: 'CO₂ Equivalent', v: latest.co2e + ' tCO₂', icon: '☁️', n: 'Carbon × 3.67' }].map(function (item) {
                        return <div key={item.l} style={{ background: 'var(--bg3)', borderRadius: 12, padding: 16, textAlign: 'center', border: '1px solid var(--border)' }}><div style={{ fontSize: 26, marginBottom: 9 }}>{item.icon}</div><div style={{ fontSize: 16, fontWeight: 800, fontFamily: 'var(--mono)', color: 'var(--green)' }}>{item.v}</div><div style={{ fontSize: 9.5, color: 'var(--muted)', marginTop: 4, fontWeight: 700 }}>{item.l}</div><div style={{ fontSize: 8.5, color: '#3a5c44', marginTop: 2 }}>{item.n}</div></div>;
                      })}
                    </div>
                  </div>
                  <div className="card">
                    <div className="card-title">Full Weekly Data</div>
                    <div style={{ overflowX: 'auto' }}>
                      <table>
                        <thead><tr>{['Day', 'Plants', 'Humidity', 'Temp', 'Solar', 'CO₂', 'Credits', 'Health'].map(function (h) { return <th key={h}>{h}</th>; })}</tr></thead>
                        <tbody>{week.map(function (r, i) {
                          return (
                            <tr key={i}>
                              <td style={{ fontWeight: 800 }}>{r.day}</td>
                              <td style={{ fontFamily: 'var(--mono)', color: 'var(--green)' }}>{r.p && r.p.toLocaleString()}</td>
                              <td style={{ fontFamily: 'var(--mono)', color: r.h > 65 ? 'var(--gold)' : 'var(--blue)' }}>{r.h}%</td>
                              <td style={{ fontFamily: 'var(--mono)' }}>{r.t}°C</td>
                              <td style={{ fontFamily: 'var(--mono)', color: 'var(--gold)' }}>{r.s}</td>
                              <td style={{ fontFamily: 'var(--mono)', color: 'var(--blue)' }}>{r.co2e}</td>
                              <td style={{ fontFamily: 'var(--mono)', color: 'var(--green)', fontWeight: 800 }}>{r.credits}</td>
                              <td><span className="chip chip-g">{r.health}%</span></td>
                            </tr>
                          );
                        })}</tbody>
                      </table>
                    </div>
                  </div>
                </>
              ) : <div className="empty"><div className="ei">🔬</div>No records yet — simulate some days first!</div>}
            </div>
          )}

          {activeTab === 'simulate' && (
            <div className="fu">
              <div className="g2b">
                <div className="card">
                  <div className="card-title">🤖 OpenCV Plant Detection Sim</div>
                  <div style={{ fontSize: 12.5, color: 'var(--muted)', lineHeight: 1.9, marginBottom: 20 }}>
                    Simulates the Python pipeline:<br />
                    → Extracts frame from camera video feed<br />
                    → HSV thresholding → isolate green pixels<br />
                    → Contour detection → count plants<br />
                    → Wokwi ESP32 sensor readings<br />
                    → IPCC carbon math → POST to blockchain
                  </div>
                  <button className="btn full" disabled={running || simDay >= apiDates.length} onClick={simulate}>
                    {running ? <><Spin />Running Detection...</> : simDay >= apiDates.length ? 'Analysis Complete (' + apiDates.length + '/' + apiDates.length + ' Days)' : '▶ Simulate ' + apiDates[simDay % apiDates.length]}
                  </button>
                  {recs.length > 0 && <div style={{ marginTop: 11, textAlign: 'center', fontSize: 11.5, color: 'var(--muted)', fontWeight: 600 }}>{recs.length} day{recs.length !== 1 ? 's' : ''} recorded</div>}
                </div>
                <div className="card">
                  <div className="card-title">Last Result</div>
                  {latest ? (
                    [['Plants', latest.p && latest.p.toLocaleString()], ['Humidity', latest.h + '%'], ['Temp', latest.t + '°C'], ['Solar', latest.s + ' W/m²'], ['AGB', latest.agb + ' t/ha'], ['CO₂eq', latest.co2e + ' tCO₂'], ['Credits', '' + latest.credits], ['Health', latest.health + '%']].map(function ([k, v]) {
                      return <div key={k} className="info-row"><span className="ik">{k}</span><span className="iv">{v}</span></div>;
                    })
                  ) : <div className="empty" style={{ padding: '28px 10px' }}><div className="ei">🤖</div>Click simulate to run</div>}
                </div>
              </div>
              <div className="card">
                <div className="card-title">Carbon Calculation Steps</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 4, fontSize: 13 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ color: 'var(--green)', fontWeight: 800 }}>1. Biomass:</span> <span style={{ color: 'var(--text)' }}>Total Plants × Plant Weight</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ color: 'var(--blue)', fontWeight: 800 }}>2. Carbon:</span> <span style={{ color: 'var(--text)' }}>50% of Total Biomass</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ color: 'var(--gold)', fontWeight: 800 }}>3. CO₂eq:</span> <span style={{ color: 'var(--text)' }}>Carbon × 3.67 (Molecular wt ratio)</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 5, padding: '6px', background: 'rgba(76, 130, 89, 0.08)', borderRadius: '6px' }}>
                    <span style={{ color: 'var(--green)', fontWeight: 800 }}>🌿 Final Credits:</span> <span style={{ color: 'var(--text)', fontWeight: 600 }}>1 Carbon Credit = 1 Ton of CO₂eq</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {activeTab === 'weather' && (
            <div className="sg4 fu">
              {apiWeather ? (
                <>
                  <div className="stat-card">
                    <div className="stat-label">Temperature</div>
                    <div style={{ fontSize: 26, fontWeight: 800, fontFamily: 'var(--mono)', color: 'var(--text)', marginTop: 4 }}>{apiWeather.weather.temperature}°C</div>
                  </div>
                  <div className="stat-card">
                    <div className="stat-label">Humidity</div>
                    <div style={{ fontSize: 26, fontWeight: 800, fontFamily: 'var(--mono)', color: 'var(--blue)', marginTop: 4 }}>{apiWeather.weather.humidity}%</div>
                  </div>
                  <div className="stat-card">
                    <div className="stat-label">Wind Speed</div>
                    <div style={{ fontSize: 26, fontWeight: 800, fontFamily: 'var(--mono)', color: 'var(--muted)', marginTop: 4 }}>{apiWeather.weather.wind} km/h</div>
                  </div>
                  <div className="stat-card">
                    <div className="stat-label">Precipitation</div>
                    <div style={{ fontSize: 26, fontWeight: 800, fontFamily: 'var(--mono)', color: 'var(--teal)', marginTop: 4 }}>{apiWeather.weather.precipitation} mm</div>
                  </div>

                  <div className="card" style={{ gridColumn: '1 / -1', marginTop: 15 }}>
                    <div className="card-title">Live Agricultural Alerts</div>
                    {apiWeather.alerts.map(function (alert, i) {
                      const isCrit = alert.startsWith('CRITICAL');
                      const isWarn = alert.startsWith('WARNING');
                      const bg = isCrit ? 'rgba(BD, 91, 74, .1)' : isWarn ? 'rgba(CC, 145, 58, .1)' : 'rgba(76, 130, 89, .08)';
                      const c = isCrit ? 'var(--red)' : isWarn ? 'var(--gold)' : 'var(--green)';
                      return (
                        <div key={i} style={{ padding: 12, borderRadius: 8, background: isCrit ? 'rgba(255,0,0,0.05)' : isWarn ? 'rgba(255,165,0,0.05)' : 'rgba(76, 130, 89, .08)', color: c, fontWeight: 700, marginBottom: 8, fontSize: 13 }}>
                          {alert}
                        </div>
                      );
                    })}
                    <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 10, textAlign: 'right' }}>
                      Data powered by Open-Meteo API
                    </div>
                  </div>
                </>
              ) : (
                <div className="empty" style={{ gridColumn: '1 / -1' }}><Spin /> Fetching Live Weather Data...</div>
              )}
            </div>
          )}


        </div>
      );
    }

    /* ── TRADER MARKETPLACE ── */
    function TraderMarket({ user, setUser, setToast, activeTab, setActiveTab }) {
      const [filter, setFilter] = useState('all');
      const [sel, setSel] = useState(null);
      const [qty, setQty] = useState('10');
      const [buying, setBuying] = useState(false);
      const [tick, setTick] = useState(0);

      const [apiFarm, setApiFarm] = useState(null);

      React.useEffect(function () {
        const fetchApiFarm = async function () {
          try {
            const isFile = window.location.protocol === 'file:';
            const apiHost = isFile ? '127.0.0.1' : window.location.hostname;
            const res = await fetch(`http://${apiHost}:8000/api/v1/analyze-period`);
            if (res.ok) {
              const data = await res.json();
              if (data.status === 'success' && data.summary && data.summary.total_credits_for_period > 0) {
                const dates = data.summary.analyzed_dates;
                const lastDate = dates[dates.length - 1];
                const lastCo2 = data.period_data[lastDate].carbon_data.total_co2_sequestered_kg;
                const agb = +(lastCo2 / 1000 / 1.835).toFixed(1);
                const avgHealth = Math.round(data.summary.average_health_index * 100);
                setApiFarm({
                  id: 'api-real-farm',
                  farmName: data.farm_name + ' (API Real)',
                  loc: 'Satellite Link',
                  crop: 'API Data',
                  total: data.summary.total_credits_for_period,
                  cons: avgHealth || 92,
                  bee: true,
                  verra: true,
                  price: +(15 + (avgHealth || 92) * 0.1).toFixed(1),
                  agb: agb
                });
              }
            }
          } catch (e) { }
        };
        fetchApiFarm();
      }, []);

      const farms = useMemo(function () {
        let f = DB.get('farmers', []).filter(function (x) { return x.total > 0; });
        if (apiFarm) f = [apiFarm, ...f];
        if (filter === 'verified') f = f.filter(function (x) { return x.bee && x.verra; });
        if (filter === 'top') f = f.filter(function (x) { return x.cons >= 85; });
        return f.map(function (x) { return Object.assign({}, x, { price: x.price || +(15 + x.cons * 0.1).toFixed(1) }); });
      }, [filter, tick, apiFarm]);

      const fu = DB.get('traders', []).find(function (t) { return t.id === user.id; }) || user;

      const buy = function () {
        if (!sel || buying || !qty || Number(qty) <= 0) return;
        const n = Number(qty);
        if (n > sel.total) { setToast({ msg: '❌ Only ' + sel.total + ' credits available.', type: 'error' }); return; }
        setBuying(true);
        setTimeout(function () {
          const tx = '0x' + Array.from({ length: 64 }, function () { return '0123456789abcdef'[Math.floor(Math.random() * 16)]; }).join('');
          const cost = +(n * sel.price).toFixed(2);
          if (sel.id === 'api-real-farm') {
            setApiFarm(function (prev) { return Object.assign({}, prev, { total: +(prev.total - n).toFixed(2) }); });
          } else {
            const farmers = DB.get('farmers', []), fi = farmers.findIndex(function (f) { return f.id === sel.id; });
            if (fi >= 0) { farmers[fi].total = +(farmers[fi].total - n).toFixed(2); DB.set('farmers', farmers); }
          }
          const traders = DB.get('traders', []), ti = traders.findIndex(function (t) { return t.id === user.id; });
          if (ti >= 0) {
            traders[ti].credits = (traders[ti].credits || 0) + n;
            traders[ti].spent = +((traders[ti].spent || 0) + cost).toFixed(2);
            traders[ti].txs = (traders[ti].txs || []).concat([{ farm: sel.farmName, qty: n, price: sel.price, cost: cost, tx: tx, ts: new Date().toISOString() }]);
            DB.set('traders', traders); setUser(traders[ti]);
          }
          setBuying(false); setSel(null); setTick(function (t) { return t + 1; });
          setToast({ msg: '✅ Bought ' + n + ' credits from ' + sel.farmName + '! Tx: ' + tx.slice(0, 14) + '...', type: 'success' });
        }, 1500);
      };

      return (
        <div>
          <div className="topbar">
            <div>
              <div className="pg-title">Carbon Credit <span>Marketplace</span></div>
              <div className="pg-sub">Wallet: {(fu.wallet || '').slice(0, 22) || '—'}... · Polygon Amoy</div>
            </div>
            <div className="tb-right">
              <div className="live-tag"><div className="live-dot" />{farms.length} Active Farms</div>
              <div className="user-pill"><div className="u-dot" />{fu.name}</div>
            </div>
          </div>
          <div className="tabs">
            {[['marketplace', '📈 Marketplace'], ['portfolio', '💼 Portfolio'], ['Wallet', '🔗 Wallet']].map(function ([k, v]) {
              return <button key={k} className={'tab' + (activeTab === k ? ' on' : '')} onClick={function () { setActiveTab(k); }}>{v}</button>;
            })}
          </div>

          {activeTab === 'marketplace' && (
            <>
              <div className="sg4 fu">
                {[{ l: 'Credits Available', v: farms.reduce(function (a, f) { return a + f.total; }, 0).toFixed(1), c: 'var(--green)' }, { l: 'Avg Price/Credit', v: farms.length ? '₹' + (farms.reduce(function (a, f) { return a + f.price; }, 0) / farms.length).toFixed(1) : '₹0', c: 'var(--blue)' }, { l: 'Verified Farms', v: farms.filter(function (f) { return f.bee || f.verra; }).length, c: 'var(--gold)' }, { l: 'Avg Consistency', v: farms.length ? Math.round(farms.reduce(function (a, f) { return a + f.cons; }, 0) / farms.length) + '%' : '0%', c: 'var(--teal)' }].map(function (item) {
                  return <div key={item.l} className="stat-card"><div className="stat-label">{item.l}</div><div style={{ fontSize: 26, fontWeight: 800, fontFamily: 'var(--mono)', color: item.c, marginTop: 4 }}>{item.v}</div></div>;
                })}
              </div>
              <div style={{ display: 'flex', gap: 7, marginBottom: 15, alignItems: 'center', flexWrap: 'wrap' }}>
                {[['all', 'All Farms'], ['verified', '✓ Verified'], ['top', '⭐ Top']].map(function ([k, v]) {
                  return <button key={k} className={'tab' + (filter === k ? ' on' : '')} onClick={function () { setFilter(k); }}>{v}</button>;
                })}
                <span style={{ marginLeft: 'auto', fontSize: 10.5, color: 'var(--muted)', fontFamily: 'var(--mono)', fontWeight: 700 }}>{farms.length} farm{farms.length !== 1 ? 's' : ''}</span>
              </div>
              {farms.length === 0 ? (
                <div className="empty fu"><div className="ei">🌾</div>No farms match. Farmers need to simulate first!</div>
              ) : (
                <div className="farms-grid fu">
                  {farms.map(function (farm) {
                    return (
                      <div key={farm.id} className="farm-card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 11 }}>
                          <div><div style={{ fontSize: 14.5, fontWeight: 800, marginBottom: 2 }}>{farm.farmName}</div><div style={{ fontSize: 10.5, color: 'var(--muted)', fontFamily: 'var(--mono)' }}>📍 {farm.loc} · {farm.crop}</div></div>
                          <span className={'badge ' + (farm.cons >= 85 ? 'b-hi' : farm.cons >= 70 ? 'b-md' : 'b-lo')}>{farm.cons}% cons.</span>
                        </div>
                        <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginBottom: 11 }}>
                          {farm.bee && <span className="badge b-bee">🔵 BEE</span>}
                          {farm.verra && <span className="badge b-verra">⭐ Verra</span>}
                          {!farm.bee && !farm.verra && <span className="badge" style={{ background: 'rgba(77,122,90,.08)', color: 'var(--muted)', border: '1px solid rgba(77,122,90,.15)' }}>Unverified</span>}
                        </div>
                        <div className="farm-stats">
                          <div className="fsb"><div className="fsb-val">{farm.total && farm.total.toFixed(1)}</div><div className="fsb-lbl">Credits</div></div>
                          <div className="fsb"><div className="fsb-val" style={{ color: 'var(--blue)' }}>₹{farm.price}</div><div className="fsb-lbl">per credit</div></div>
                          <div className="fsb"><div className="fsb-val" style={{ color: 'var(--gold)' }}>{farm.agb || (getRecs(farm.id).slice(-1)[0] || {}).agb || 0}t</div><div className="fsb-lbl">Biomass</div></div>
                        </div>
                        <button className="btn full" disabled={farm.total <= 0} onClick={function () { setSel(farm); setQty('10'); }}>
                          {farm.total > 0 ? 'Buy Credits →' : 'No Credits Available'}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {activeTab === 'portfolio' && (
            <div className="fu">
              <div className="g3" style={{ marginBottom: 14 }}>
                <div className="pf-big"><div className="pf-val">{fu.credits || 0}</div><div className="pf-lbl">Credits Owned</div></div>
                <div className="pf-big"><div className="pf-val">₹{(fu.spent || 0).toFixed(2)}</div><div className="pf-lbl">Total Spent</div></div>
                <div className="pf-big"><div className="pf-val">{(fu.txs || []).length}</div><div className="pf-lbl">Transactions</div></div>
              </div>
              <div className="card">
                <div className="card-title">Transaction History</div>
                {!(fu.txs && fu.txs.length) ? (
                  <div className="empty"><div className="ei">💼</div>No transactions yet.</div>
                ) : (
                  <div style={{ overflowX: 'auto' }}>
                    <table>
                      <thead><tr>{['Farm', 'Qty', 'Price', 'Total', 'Tx Hash', 'Date'].map(function (h) { return <th key={h}>{h}</th>; })}</tr></thead>
                      <tbody>{(fu.txs || []).slice().reverse().map(function (t, i) {
                        return (
                          <tr key={i}>
                            <td style={{ fontWeight: 700 }}>{t.farm}</td>
                            <td style={{ fontFamily: 'var(--mono)', color: 'var(--green)' }}>{t.qty}</td>
                            <td style={{ fontFamily: 'var(--mono)' }}>₹{t.price}</td>
                            <td style={{ fontFamily: 'var(--mono)', color: 'var(--blue)' }}>₹{t.cost}</td>
                            <td><a className="tx-link" href={'https://www.oklink.com/amoy/tx/' + t.tx} target="_blank" rel="noopener noreferrer">{t.tx && t.tx.slice(0, 14)}...</a></td>
                            <td style={{ color: 'var(--muted)', fontSize: 10.5, fontFamily: 'var(--mono)' }}>{new Date(t.ts).toLocaleDateString()}</td>
                          </tr>
                        );
                      })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          )}

          {activeTab === 'Wallet' && (
            <div className="fu">
              <div className="g2b">
                <div className="card">
                  <div className="card-title">Network Status</div>
                  {[['Network', 'Polygon Amoy Testnet'], ['Chain ID', '80002'], ['RPC', 'rpc-amoy.polygon.technology'], ['Gas Price', '~12 Gwei'], ['Block', '#4,821,044'], ['Status', '🟢 Operational']].map(function ([k, v]) {
                    return <div key={k} className="info-row"><span className="ik">{k}</span><span className="iv">{v}</span></div>;
                  })}
                </div>
                <div className="card">
                  <div className="card-title">Your Wallet</div>
                  <div style={{ textAlign: 'center', padding: '12px 0' }}>
                    <div style={{ fontSize: 46, marginBottom: 11 }}>🦊</div>
                    <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text)', wordBreak: 'break-all', background: 'var(--bg3)', borderRadius: 8, padding: '9px 11px', border: '1px solid var(--border)', marginBottom: 13, lineHeight: 1.6 }}>{fu.wallet || 'No wallet connected'}</div>
                    <div style={{ fontSize: 11.5, color: 'var(--muted)', marginBottom: 14, lineHeight: 1.7 }}>GreenCredit Tokens (GCT) minted on Polygon Amoy at credit threshold.</div>
                    <a href="https://faucet.polygon.technology/" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--blue)', fontSize: 12, fontWeight: 800, textDecoration: 'none' }}>🚰 Get free MATIC →</a>
                  </div>
                </div>
              </div>
              <div className="card">
                <div className="card-title">GreenCredit Token</div>
                <div style={{ fontSize: 13, color: 'var(--muted)', lineHeight: 2 }}><strong style={{ color: 'var(--text)' }}>1 GCT = 1 tonne CO₂</strong> sequestered by a verified farm. ERC-20 on Polygon Amoy — view on <a href="https://www.oklink.com/amoy" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--blue)', fontWeight: 700 }}>Amoy Explorer</a>. Mint threshold: <strong style={{ color: 'var(--green)' }}>100 credits</strong>.</div>
              </div>
            </div>
          )}

          {sel && (
            <div className="overlay" onClick={function (e) { if (e.target === e.currentTarget && !buying) setSel(null); }}>
              <div className="modal">
                <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 5 }}>Buy Carbon Credits</div>
                <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 22 }}>{sel.farmName} · <span style={{ color: 'var(--blue)', fontWeight: 700 }}>₹{sel.price}/credit</span> · {sel.total && sel.total.toFixed(1)} available</div>
                <input className="qty-input" type="number" value={qty} min="1" max={Math.floor(sel.total)} onChange={function (e) { setQty(e.target.value); }} placeholder="0" />
                <div style={{ textAlign: 'center', fontSize: 13, color: 'var(--muted)', marginBottom: 18 }}>
                  Total: <span style={{ color: 'var(--green)', fontWeight: 800, fontSize: 18 }}>₹{(Number(qty) * sel.price).toFixed(2)}</span>
                  {' · '}<span style={{ color: 'var(--blue)', fontWeight: 700 }}>{qty} tCO₂</span>
                </div>
                <div className="modal-btns">
                  <button className="btn-ghost" onClick={function () { if (!buying) setSel(null); }}>Cancel</button>
                  <button className="btn" disabled={buying || !qty || Number(qty) <= 0} onClick={buy}>{buying ? <><Spin />Processing...</> : 'Confirm Purchase'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── AUTH SCREEN ── */
    function AuthScreen({ onLogin }) {
      const [mode, setMode] = useState('login');
      const [role, setRole] = useState('farmer');
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState('');
      const [ok, setOk] = useState('');
      const [fields, setFields] = useState({ email: '', pw: '', name: '', farmName: '', loc: '', area: '', crop: 'Rice', wallet: '' });
      const upd = function (k) { return function (e) { setFields(function (p) { return Object.assign({}, p, { [k]: e.target.value }); }); }; };

      const handle = function () {
        setErr(''); setOk('');
        if (!fields.email.trim()) return setErr('Email is required.');
        if (!fields.pw || fields.pw.length < 8) return setErr('Password must be 8+ characters.');
        if (mode === 'register' && !fields.name.trim()) return setErr('Name is required.');
        setLoading(true);
        setTimeout(function () {
          try {
            let u;
            if (mode === 'login') {
              u = findUser(fields.email.trim().toLowerCase(), fields.pw, role);
              if (!u) throw new Error('Invalid email or password.');
            } else {
              const extra = role === 'farmer' ? { farmName: fields.farmName || fields.name + "'s Farm", loc: fields.loc || 'India', area: Number(fields.area) || 10, crop: fields.crop } : (role === 'trader' && fields.wallet ? { wallet: fields.wallet } : {});
              u = registerUser(role, Object.assign({ email: fields.email.trim().toLowerCase(), pw: fields.pw, name: fields.name.trim() }, extra));
              setOk('Account created!');
            }
            setTimeout(function () { onLogin(role, u); }, 350);
          } catch (e) { setErr(e.message); }
          setLoading(false);
        }, 550);
      };

      const quick = function (e, r) { const u = findUser(e, 'password123', r); if (u) onLogin(r, u); };

      return (
        <div className="login-bg">
          <div className="login-card">
            <div className="login-head">
              <span className="login-icon">🌿</span>
              <div className="login-title">Green Ledger</div>
              <div className="login-sub">Project Demo Link</div>
            </div>

            <div className="login-footer" style={{ marginTop: 0 }}>
              <div style={{ marginBottom: 15, fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.5, fontWeight: 800 }}>— Select Portal to View —</div>
              <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap', flexDirection: 'column' }}>
                {[['ravi@demo.io', 'farmer', '🌾 View as Farmer (Video/Sensor Sim)'], ['amit@demo.io', 'trader', '📈 View as Trader (Marketplace)']].map(function ([e, r, l]) {
                  return <button key={e} className="btn full" style={{ padding: '16px' }} onClick={function () { quick(e, r); }}>{l}</button>;
                })}
              </div>
              <div style={{ marginTop: 18, fontSize: 10, color: '#6b8071', lineHeight: 1.5 }}>
                Bypassing standard auth for hackathon demo purposes. Both views simulate connection to the active FastAPI backend and Wokwi sensors.
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── APP ROOT ── */
    function App() {
      const [page, setPage] = useState('login');
      const [role, setRole] = useState(null);
      const [user, setUser] = useState(null);
      const [toast, setToast] = useState(null);
      const [navIdx, setNavIdx] = useState(0);
      const [farmerTab, setFarmerTab] = useState('overview');
      const [traderTab, setTraderTab] = useState('marketplace');

      useEffect(function () {
        if (toast) { const t = setTimeout(function () { setToast(null); }, 5500); return function () { clearTimeout(t); }; }
      }, [toast]);

      const login = function (r, u) { setRole(r); setUser(u); setPage(r === 'farmer' ? 'farmer' : 'trader'); setNavIdx(0); };
      const logout = function () { setPage('login'); setRole(null); setUser(null); };

      if (page === 'login') return <>

        <AuthScreen onLogin={login} />
        <Toast toast={toast} onClose={function () { setToast(null); }} />
      </>;

      const FN = [{ icon: '🌿', label: 'Dashboard', tab: 'overview' }, { icon: '📊', label: 'Analytics', tab: 'deepdive' }, { icon: '🤖', label: 'Video Analysis', tab: 'simulate' }, { icon: '🌤️', label: 'Live Weather', tab: 'weather' }];
      const TN = [{ icon: '📈', label: 'Marketplace', tab: 'marketplace' }, { icon: '💼', label: 'Portfolio', tab: 'portfolio' }, { icon: '🔗', label: 'Wallet', tab: 'Wallet' }];
      const nav = role === 'farmer' ? FN : TN;

      const handleNav = function (i, tab) { setNavIdx(i); if (role === 'farmer') setFarmerTab(tab); else setTraderTab(tab); };
      const sensors = role === 'farmer' ? [['ESP32 Wokwi', 'Polling'], ['Camera Feed', 'Active'], ['OpenCV API', 'Ready'], ['Carbon Math', 'Sync']] : [['Polygon Amoy', 'Connected'], ['Gas', '12 Gwei'], ['Verifier', 'Verra'], ['GCT Token', 'Active']];
      const fu = role === 'farmer' ? DB.get('farmers', []).find(function (f) { return f.id === user.id; }) || user : DB.get('traders', []).find(function (t) { return t.id === user.id; }) || user;

      return <>

        <div className="shell">
          <div className="sidebar">
            <div className="sb-logo"><span className="sb-logo-icon">🌿</span><div><div className="sb-logo-name">Green Ledger</div><div className="sb-logo-sub">Carbon Credits</div></div></div>
            {nav.map(function (item, i) {
              return <div key={i} className={'nav-item' + (navIdx === i ? ' active' : '')} onClick={function () { handleNav(i, item.tab); }}><span className="nav-icon">{item.icon}</span>{item.label}</div>;
            })}
            <div className="sb-div" />
            <div className="sb-section">{role === 'farmer' ? 'Sensors' : 'Network'}</div>
            {sensors.map(function ([k, v]) { return <div key={k} className="sb-kv"><span className="sb-k">{k}</span><span className="sb-v">{v}</span></div>; })}
            <div className="sb-div" />
            <div className="sb-section">Account</div>
            <div className="sb-kv"><span className="sb-k">Role</span><span className="sb-v" style={{ color: role === 'farmer' ? 'var(--green)' : 'var(--blue)', textTransform: 'capitalize' }}>{role}</span></div>
            <div className="sb-kv"><span className="sb-k">ID</span><span className="sb-v">{(fu && fu.fid) || ((fu && fu.id || '').slice(0, 8)) || '—'}</span></div>
            <div className="sb-spacer" />
            <button className="logout-btn" onClick={logout}>← Logout</button>
          </div>
          <div className="main">
            {page === 'farmer' && user && <FarmerDash user={user} setUser={setUser} setToast={setToast} activeTab={farmerTab} setActiveTab={function (t) { setFarmerTab(t); const i = FN.findIndex(function (n) { return n.tab === t; }); if (i >= 0) setNavIdx(i); }} />}
            {page === 'trader' && user && <TraderMarket user={user} setUser={setUser} setToast={setToast} activeTab={traderTab} setActiveTab={function (t) { setTraderTab(t); const i = TN.findIndex(function (n) { return n.tab === t; }); if (i >= 0) setNavIdx(i); }} />}
          </div>
        </div>
        <Toast toast={toast} onClose={function () { setToast(null); }} />
      </>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
  </script>
</body>

</html>
